services:
  pg:
    image: postgres:18.1-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}' ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:RELEASE.2023-09-07T02-05-02Z
    restart: unless-stopped
    command: server /data --address ":9000" --console-address ":9090"
    ports:
      - "9001:9000"
      - "9091:9090"
    env_file:
      - .env
    volumes:
      - ./data/minio:/data

  api:
    container_name: api
    build:
      context: ./codik-api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:asdfjkl@pg:5432/nestjs?schema=public
    ports:
      - '5000:5000'
    depends_on:
      pg:
        condition: service_healthy

  client:
    container_name: client
    build:
      context: ./codik-client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data: